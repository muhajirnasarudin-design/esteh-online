<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login ESTEH ONLINE</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">

  <h2>ESTEH ONLINE</h2>

  <p class="login-text">
    Pilih Jenis Akun
  </p>

  <!-- PEMBELI -->
  <div class="role-card">

    <h3>🛒 Pembeli</h3>

    <p>
      Pesan minuman online dengan mudah
    </p>

    <button onclick="showBuyerLogin()">
      Masuk Sebagai Pembeli
    </button>

  </div>

  <!-- PEMILIK TOKO -->
  <div class="role-card owner">

    <h3>🏪 Pemilik Toko</h3>

    <p>
      Kelola produk, pesanan & pembayaran
    </p>

    <button onclick="showOwnerLogin()">
      Masuk Sebagai Pemilik
    </button>

  </div>

  <!-- PENGUNJUNG -->
  <div class="role-card guest">

    <h3>👀 Pengunjung</h3>

    <p>
      Lihat menu tanpa login
    </p>

    <button onclick="window.location.href='home.html'">
      Masuk Sebagai Pengunjung
    </button>

  </div>

  <!-- FORM LOGIN -->
  <div id="loginForm" style="display:none; margin-top:20px;">

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">
      Login
    </button>

    <p>
      Belum punya akun?
      <a href="register.html">
        Daftar
      </a>
    </p>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase.js"></script>

<script>

let selectedRole = "";

function showBuyerLogin(){

  selectedRole = "buyer";

  document.getElementById("loginForm").style.display = "block";

}

function showOwnerLogin(){

  selectedRole = "owner";

  document.getElementById("loginForm").style.display = "block";

}

function login(){

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)

  .then(() => {

    if(selectedRole === "owner"){

      window.location.href = "admin.html";

    }

    else{

      window.location.href = "home.html";

    }

  })

  .catch((error) => {

    alert(error.message);

  });

}

</script>

</body>
</html>
